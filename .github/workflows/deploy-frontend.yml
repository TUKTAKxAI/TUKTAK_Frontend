name: Deploy Frontend to S3

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  S3_BUCKET: ${{ vars.S3_BUCKET }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
  VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
  VITE_JUSO_SEARCH_URL: ${{ vars.VITE_JUSO_SEARCH_URL }}
  VITE_JUSO_POPUP_URL: ${{ vars.VITE_JUSO_POPUP_URL }}
  VITE_USE_MATCHING_MOCKS: ${{ vars.VITE_USE_MATCHING_MOCKS }}
  VITE_JUSO_CONFIRM_KEY: ${{ secrets.VITE_JUSO_CONFIRM_KEY }}
  VITE_JUSO_SEARCH_KEY: ${{ secrets.VITE_JUSO_SEARCH_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tuktak_frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tuktak_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload assets to S3
        run: |
          aws s3 sync dist "s3://$S3_BUCKET" \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload index.html to S3
        run: |
          aws s3 cp dist/index.html "s3://$S3_BUCKET/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"
